name: Refresh Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *' # تشغيل آلي كل 6 ساعات
  workflow_dispatch: # تشغيل يدوياً بضغطة زر

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pandas openpyxl requests

    - name: Run Update Script
      run: python update_dashboard.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # إضافة ملف index.html المستخرج الجديد
        git add index.html
        
        # حفظ التعديلات محلياً
        git diff-index --quiet HEAD || git commit -m "🔄 تحديث دوري تلقائي للبيانات التدريبية"
        
        # دمج آمن ومباشر
        git pull origin main -X ours --allow-unrelated-histories --rebase=false || true
        
        # رفع البيانات الحية إلى المستودع
        git push origin main
