name: Refresh Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *' # تشغيل آلي كل 6 ساعات
  workflow_dispatch: # تشغيل يدوياً بضغطة زر

# 🔑 وضعنا الصلاحيات هنا على مستوى الملف بالكامل لإجبار السيرفر على منح إذن الكتابة
permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pandas openpyxl requests

    - name: Run Update Script
      run: python update_dashboard.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # سحب آخر التغييرات منعاً للتعارض
        git pull origin main --rebase
        
        # إضافة وتحديث الملف
        git add index.html
        
        # تنفيذ الحفظ والدفع إذا وجد تغيير في المحتوى
        git diff-index --quiet HEAD || (git commit -m "🔄 تحديث دوري تلقائي للبيانات التدريبية" && git push)
