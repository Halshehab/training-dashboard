name: Refresh Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *' # تحديث دوري مبرمج كل 6 ساعات تلقائياً
  workflow_dispatch: # يتيح لك التشغيل يدوياً متى ما رغبت بضغطة زر واحدة

permissions:
  contents: write
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install pandas openpyxl requests

    - name: Run Update Script
      run: python update_dashboard.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        git add index.html
        
        git diff-index --quiet HEAD || git commit -m "🔄 تحديث حي ومباشر للبيانات من Google Sheets"
        
        git pull origin main -X ours --allow-unrelated-histories --rebase=false || true
        
        git push origin main
